<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventify - Add Event</title>
    <!-- Bootstrap helps style form controls and buttons quickly. -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <div class="header">
        Eventify
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Sidebar Navigation -->
        <div class="sidebar">
            <div class="menu-icon">Menu</div>
            <a href="index.html" class="nav-button">Home</a>
            <a href="add-event.html" class="nav-button active">Add Event</a>
            <a href="view-events.html" class="nav-button">View Events</a>
            <a href="about.html" class="nav-button">About</a>
        </div>

        <!-- Content Area -->
        <div class="content">
            <div class="form-container">
                <!-- JS updates this title to "Edit Event" when ?edit=id is present. -->
                <div class="form-header" id="form-title">
                    Add Event
                </div>

                <!-- Main event form used for both create and edit flows. -->
                <form id="event-form">
                    <div class="form-content">
                        <div class="form-group">
                            <label for="event-name">Event Name</label>
                            <input class="form-control" type="text" id="event-name" placeholder="Enter event name" required>
                        </div>

                        <div class="form-group">
                            <label for="event-date">Event Date</label>
                            <input class="form-control" type="date" id="event-date" required>
                        </div>

                        <div class="form-group">
                            <label for="event-time">Event Time</label>
                            <input class="form-control" type="time" id="event-time" required>
                        </div>

                        <div class="form-group">
                            <label for="location">Location</label>
                            <input class="form-control" type="text" id="location" placeholder="Enter location" required>
                        </div>

                        <div class="form-group">
                            <label for="category">Category</label>
                            <select class="form-select" id="category" required>
                                <option value="">Select a category</option>
                                <option>Music</option>
                                <option>Sports</option>
                                <option>Arts & Culture</option>
                                <option>Technology</option>
                                <option>Food & Drink</option>
                                <option>Business</option>
                                <option>Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="description">Description</label>
                            <textarea class="form-control" id="description" placeholder="Enter event description" required></textarea>
                        </div>

                        <div class="form-group">
                            <label>Attach an Image</label>
                            <!-- Hidden native input is triggered by the custom browse button. -->
                            <input type="file" id="event-image" accept="image/*" class="hidden-input">
                            <button class="browse-button btn btn-primary" id="browse-image" type="button">Browse Files</button>
                            <!-- JS writes selected file name + preview here. -->
                            <p class="file-name" id="selected-file-name">No image selected</p>
                            <img id="image-preview" class="image-preview hidden-input" alt="Selected event image preview">
                        </div>
                    </div>

                    <div class="form-buttons">
                        <button class="btn btn-primary" type="submit" id="save-button">Add Event</button>
                        <button class="btn btn-outline-secondary" type="reset" id="clear-button">Clear</button>
                    </div>
                </form>
                <!-- Shared status text for success/error messages from API calls. -->
                <p class="form-message" id="form-message" aria-live="polite"></p>
            </div>
        </div>
    </div>
    <!-- Handles create/update requests to the REST API. -->
    <script src="add-event.js"></script>
</body>
</html>
