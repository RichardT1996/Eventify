<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventify - View Events</title>
    <!-- Bootstrap utility classes are used for spacing and form styling. -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <div class="header">
        Eventify
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Sidebar Navigation -->
        <div class="sidebar">
            <div class="menu-icon">Menu</div>
            <a href="index.html" class="nav-button">Home</a>
            <a href="add-event.html" class="nav-button">Add Event</a>
            <a href="view-events.html" class="nav-button active">View Events</a>
            <a href="about.html" class="nav-button">About</a>
        </div>

        <!-- Content Area -->
        <div class="content">
            <h1 class="mb-4">View Events</h1>

            <!-- Filter Section -->
            <div class="filter-section">
                <div class="filter-row">
                    <!-- Live search input listened to by view-events.js. -->
                    <input class="form-control" type="text" id="search-input" placeholder="Search events">
                </div>
            </div>

            <!-- Events Grid -->
            <!-- JS writes the current count after fetching/filtering events. -->
            <p class="results-count" id="results-count"></p>
            <!-- Cards are rendered dynamically from API data. -->
            <div class="events-grid" id="events-grid"></div>
            <!-- Empty/error state is toggled by JS when needed. -->
            <div class="empty-state hidden-input" id="empty-state">
                <p>No events found. Add a new event to get started.</p>
            </div>
        </div>
    </div>
    <!-- Fetches events and renders cards with edit/delete actions. -->
    <script src="view-events.js"></script>
</body>
</html>
